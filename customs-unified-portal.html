<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>关务一体化整合门户 · 工作台 / 看板 / 海外 / AEO（原型）</title>
  <style>
    :root {
      --bar: #0f172a;
      --bar2: #1e293b;
      --accent: #3b82f6;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #334155;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "Segoe UI", "Microsoft YaHei UI", "PingFang SC", sans-serif;
      background: #020617;
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header.portal-header {
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--bar) 0%, var(--bar2) 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      min-height: 52px;
    }
    .portal-brand {
      display: flex;
      flex-direction: column;
      padding: 8px 12px 8px 0;
      border-right: 1px solid var(--border);
      min-width: 200px;
    }
    .portal-brand strong {
      font-size: 14px;
      letter-spacing: 0.02em;
    }
    .portal-brand span {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    nav.tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 0;
      flex: 1;
    }
    nav.tabs button {
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.6);
      color: var(--muted);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    nav.tabs button:hover {
      color: var(--text);
      border-color: #475569;
    }
    nav.tabs button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    .portal-hint {
      font-size: 11px;
      color: var(--muted);
      padding: 4px 0 8px 16px;
    }
    main.portal-main {
      flex: 1;
      min-height: 0;
      position: relative;
      background: #0b1120;
    }
    .frame-wrap {
      position: absolute;
      inset: 0;
      display: none;
    }
    .frame-wrap.active { display: block; }
    .frame-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
      display: block;
    }
  </style>
</head>
<body>
  <header class="portal-header">
    <div class="portal-brand">
      <strong>关务一体化整合门户</strong>
      <span>智能工作台 · 经营分析看板 · 海外关务 · 海关认证 AEO（GitHub Pages 嵌入）</span>
    </div>
    <nav class="tabs" role="tablist" aria-label="子系统切换">
      <button type="button" role="tab" data-target="f-workbench" class="active" aria-selected="true">GTM 智能协作工作台</button>
      <button type="button" role="tab" data-target="f-dashboard" aria-selected="false">关务经营分析看板</button>
      <button type="button" role="tab" data-target="f-prototype" aria-selected="false">海外关务管理系统</button>
      <button type="button" role="tab" data-target="f-aeo" aria-selected="false">海关认证 AEO</button>
    </nav>
  </header>
  <p class="portal-hint">前三项需与本页同目录；「海关认证 AEO」嵌入线上 <code>https://xuhuibing.github.io/CN-AEO/</code>（联网预览）。</p>
  <main class="portal-main">
    <div id="f-workbench" class="frame-wrap active" role="tabpanel" aria-hidden="false">
      <iframe title="GTM 智能协作工作台" src="workbench.html"></iframe>
    </div>
    <div id="f-dashboard" class="frame-wrap" role="tabpanel" aria-hidden="true">
      <iframe title="关务经营分析看板" data-src="dashboard.html" loading="lazy"></iframe>
    </div>
    <div id="f-prototype" class="frame-wrap" role="tabpanel" aria-hidden="true">
      <iframe title="海外关务管理系统" data-src="prototype.html" loading="lazy"></iframe>
    </div>
    <div id="f-aeo" class="frame-wrap" role="tabpanel" aria-hidden="true">
      <iframe title="海关认证 AEO 稽核系统" data-src="https://xuhuibing.github.io/CN-AEO/" loading="lazy"></iframe>
    </div>
  </main>
  <script>
    (function () {
      var tabs = document.querySelectorAll("nav.tabs button");
      var panels = {
        "f-workbench": document.getElementById("f-workbench"),
        "f-dashboard": document.getElementById("f-dashboard"),
        "f-prototype": document.getElementById("f-prototype"),
        "f-aeo": document.getElementById("f-aeo")
      };

      function lazyLoadIframe(panel) {
        var iframe = panel.querySelector("iframe");
        if (!iframe || iframe.getAttribute("src")) return;
        var ds = iframe.getAttribute("data-src");
        if (ds) iframe.setAttribute("src", ds);
      }

      function activate(id) {
        Object.keys(panels).forEach(function (key) {
          var p = panels[key];
          var on = key === id;
          p.classList.toggle("active", on);
          p.setAttribute("aria-hidden", on ? "false" : "true");
          if (on) lazyLoadIframe(p);
        });
        tabs.forEach(function (btn) {
          var on = btn.getAttribute("data-target") === id;
          btn.classList.toggle("active", on);
          btn.setAttribute("aria-selected", on ? "true" : "false");
        });
      }

      tabs.forEach(function (btn) {
        btn.addEventListener("click", function () {
          activate(btn.getAttribute("data-target"));
        });
      });
    })();
  </script>
</body>
</html>
